name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go-checks:
    name: Go checks (lint, vet, no-cgo)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      # cargo metadata only (generate.check inside go.lint); no Rust build
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: "1.96.0"

      - name: Vet
        run: make go.vet

      - name: Changelog has an entry for the release tag
        run: make changelog.check

      - name: No-cgo unsupported path
        run: make go.test.nocgo

      - name: Lint
        run: make go.lint

  rust-lint:
    name: Rust lint (clippy, fmt)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: "1.96.0"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust
          key: lint

      - name: Clippy and fmt
        run: make rust.lint

  rust:
    name: Rust build+test (${{ matrix.target.platform }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { platform: linux-amd64, runner: ubuntu-22.04 }
          - { platform: linux-arm64, runner: ubuntu-22.04-arm }
          - { platform: darwin-arm64, runner: macos-15 }
          - { platform: darwin-amd64, runner: macos-15-intel }
          - { platform: windows-amd64, runner: windows-2025 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target.platform == 'windows-amd64' && 'x86_64-pc-windows-gnu' || '' }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust
          # the job id is shared across matrix legs; the key must disambiguate
          key: ${{ matrix.target.platform }}

      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        if: matrix.target.platform == 'windows-amd64'
        with:
          msystem: MINGW64
          path-type: inherit
          # perl: guarantees core_perl/shasum for checksum.native even if a
          # future msys2-base repackaging drops perl from the default closure
          install: >-
            make
            perl
            mingw-w64-x86_64-gcc

      - name: Build, test, bundle, checksum
        if: matrix.target.platform != 'windows-amd64'
        run: |
          set -euo pipefail
          make bundle
          make rust.test
          make checksum.native

      - name: Build, test, bundle, checksum (windows)
        if: matrix.target.platform == 'windows-amd64'
        shell: msys2 {0}
        env:
          CGO_ENABLED: "1"
          CC: gcc
          CARGO_BUILD_TARGET: x86_64-pc-windows-gnu
        run: |
          set -euo pipefail
          # mingw ld embeds link wall-clock time in the PE header; pin it to
          # the commit time so the DLL is reproducible for a given commit
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"
          make bundle
          make rust.test
          make checksum.native

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.target.platform }}
          path: internal/native/lib/${{ matrix.target.platform }}/
          if-no-files-found: error
          # release recovery (re-run or manual dispatch) republishes these
          # artifacts, so keep them well past the release window
          retention-days: 30
          # v4 artifacts are immutable within a run; without this,
          # "Re-run all jobs" fails the upload with a 409 Conflict
          overwrite: true

  go-test:
    name: Go ${{ matrix.mode }} (${{ matrix.target.platform }})
    needs: rust
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        mode: [dynamic, bundled, race]
        target:
          - { platform: linux-amd64, runner: ubuntu-22.04 }
          - { platform: linux-arm64, runner: ubuntu-22.04-arm }
          - { platform: darwin-arm64, runner: macos-15 }
          - { platform: darwin-amd64, runner: macos-15-intel }
          - { platform: windows-amd64, runner: windows-2025 }
        include:
          - mode: source
            target: { platform: linux-amd64, runner: ubuntu-22.04 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-${{ matrix.target.platform }}
          path: internal/native/lib/${{ matrix.target.platform }}

      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        if: matrix.target.platform == 'windows-amd64'
        with:
          msystem: MINGW64
          path-type: inherit
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Place source-mode archive
        if: matrix.mode == 'source'
        run: |
          set -euo pipefail
          mkdir -p rust/target/release
          cp internal/native/lib/linux-amd64/libdatafusion_go.a rust/target/release/

      - name: Test
        if: matrix.target.platform != 'windows-amd64'
        run: make go.test.${{ matrix.mode }}

      - name: Test (windows)
        if: matrix.target.platform == 'windows-amd64'
        shell: msys2 {0}
        env:
          CGO_ENABLED: "1"
          CC: gcc
        run: make go.test.${{ matrix.mode }}
