name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-22.04
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      should_release: ${{ steps.tag.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable

      - name: Check generated version files
        run: make generate.check

      - name: Compute release metadata
        id: version
        run: go run ./internal/tools/genversions -github-output "$GITHUB_OUTPUT"

      - name: Check release tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.release_tag }}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Release ${tag} already exists; skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  native:
    name: Native archive ${{ matrix.platform }}
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-15
          - platform: darwin-amd64
            runner: macos-13
          - platform: linux-amd64
            runner: ubuntu-22.04
          - platform: linux-arm64
            runner: ubuntu-22.04-arm
          - platform: windows-amd64
            runner: windows-2025

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.platform != 'windows-amd64' }}

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.platform == 'windows-amd64' }}
        with:
          targets: x86_64-pc-windows-gnu

      - uses: msys2/setup-msys2@v2
        if: ${{ matrix.platform == 'windows-amd64' }}
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Check generated version files
        if: ${{ matrix.platform != 'windows-amd64' }}
        run: make generate.check

      - name: Check generated version files
        if: ${{ matrix.platform == 'windows-amd64' }}
        shell: msys2 {0}
        run: make generate.check

      - name: Build and test bundled archive
        if: ${{ matrix.platform != 'windows-amd64' }}
        run: make test

      - name: Build and test bundled archive
        if: ${{ matrix.platform == 'windows-amd64' }}
        shell: msys2 {0}
        env:
          CGO_ENABLED: "1"
          CC: gcc
          CARGO_BUILD_TARGET: x86_64-pc-windows-gnu
        run: make test

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: internal/native/lib/${{ matrix.platform }}/*datafusion_go*
          if-no-files-found: error

  release:
    name: Cut release
    needs:
      - prepare
      - native
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-22.04
    env:
      CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable

      - name: Check generated version files
        run: make generate.check

      - name: Check main is still current
        run: |
          set -euo pipefail
          git fetch origin main --tags
          if [ "$(git rev-parse origin/main)" != "$CI_HEAD_SHA" ]; then
            echo "main advanced after CI validated ${CI_HEAD_SHA}; waiting for a newer release run" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "tag ${RELEASE_TAG} already exists" >&2
            exit 1
          fi

      - name: Download native archives
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: internal/native/lib
          merge-multiple: false

      - name: Place native archives
        run: |
          set -euo pipefail
          for dir in internal/native/lib/native-*; do
            platform="${dir##*/native-}"
            mkdir -p "internal/native/lib/${platform}"
            find "${dir}" -maxdepth 1 -type f -print | while read -r file; do
              mv "${file}" "internal/native/lib/${platform}/$(basename "${file}")"
            done
            rmdir "${dir}"
          done
          find internal/native/lib -type f -print | sort

      - name: Stage release assets
        run: make stage.release.assets

      - name: Verify downloaded release artifacts
        run: make verify.release.downloaded

      - name: Prepare release notes
        id: notes
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          notes_file="$(mktemp)"
          awk -v tag="$tag" '
            $0 == "## " tag || index($0, "## " tag " - ") == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > "$notes_file"
          if ! grep -q '[^[:space:]]' "$notes_file"; then
            echo "CHANGELOG.md entry for ${tag} is empty" >&2
            exit 1
          fi
          echo "path=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Commit release checksum manifest
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f internal/native/lib/SHA256SUMS
          if git diff --cached --quiet; then
            echo "release checksum manifest is unchanged"
          else
            git commit -m "chore: prepare ${RELEASE_TAG} native checksums"
            git push origin "HEAD:main"
          fi

      - name: Tag release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(dist/SHA256SUMS)
          while IFS= read -r file; do
            assets+=("$file")
          done < <(find dist -type f -name 'datafusion-go-*' -print | sort)
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            "${assets[@]}"
